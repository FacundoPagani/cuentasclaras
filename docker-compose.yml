services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_URL: http://localhost:8080
      DB_PATH: /var/www/html/storage/cuentasclaras.sqlite
      SESSION_SECURE: "0"
      INIT_USER_USERNAME: facu
      INIT_USER_PASSWORD: "132456"
      INIT_USER_NAME: Facu
      INIT_SECOND_USER_USERNAME: judi
      INIT_SECOND_USER_PASSWORD: "132456"
      INIT_SECOND_USER_NAME: Judi
    volumes:
      - ./:/var/www/html
      - cuentasclaras_data:/var/www/html/storage
    networks:
      - cuentasclaras

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - cuentasclaras

volumes:
  cuentasclaras_data:

networks:
  cuentasclaras:
    driver: bridge
