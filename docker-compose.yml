services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cuentasclaras
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_URL: ${APP_URL:-https://cuentasclaras.pagani.ar}
      DB_PATH: ${DB_PATH:-/var/www/html/storage/cuentasclaras.sqlite}
      SESSION_SECURE: ${SESSION_SECURE:-1}
      INIT_USER_USERNAME: ${INIT_USER_USERNAME:-facu}
      INIT_USER_PASSWORD: ${INIT_USER_PASSWORD:-132456}
      INIT_USER_NAME: ${INIT_USER_NAME:-Facu}
      INIT_SECOND_USER_USERNAME: ${INIT_SECOND_USER_USERNAME:-judi}
      INIT_SECOND_USER_PASSWORD: ${INIT_SECOND_USER_PASSWORD:-132456}
      INIT_SECOND_USER_NAME: ${INIT_SECOND_USER_NAME:-Judi}
    volumes:
      - cuentasclaras_data:/var/www/html/storage
    expose:
      - "8080"
    networks:
      web:
        aliases:
          - cuentasclaras

volumes:
  cuentasclaras_data:

networks:
  web:
    external: true
    name: ${PAGANI_NETWORK:-web}
